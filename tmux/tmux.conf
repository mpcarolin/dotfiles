# screen mode
set -g default-terminal "screen-256color"


# source config file
bind r source-file ~/.config/tmux/tmux.conf

# opening windows and panes in the same directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"


# history
set -g history-limit 4096


# allow terminal scrolling
set-option -g terminal-overrides 'xterm*:smcup@:rmcup@'

# use vi mode
setw -g mode-keys vi
set -g status-keys vi

# moving between panes with vim movement keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize the pane
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r H resize-pane -L 3
bind-key -r L resize-pane -R 3

# --- Option (Meta) navigation, no prefix ---

# Panes: Opt+hjkl
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# Windows: Opt+Shift+h / Opt+Shift+l prev/next
bind-key -n M-H previous-window
bind-key -n M-L next-window

# Sessions: Opt+Shift+j / Opt+Shift+k prev/next
bind-key -n M-J switch-client -n
bind-key -n M-K switch-client -p

# Jump to window by number: Opt+1..9
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# status line
set -g status-justify left
set -g status-interval 2

# single status line — drop any stray second line (the pane-size gutter)
set -g status on
set -gu status-format[1]

# Everforest Dark Medium palette
set -g status-style "bg=#343f44,fg=#d3c6aa"
set -g status-left "#[bg=#a7c080,fg=#2d353b,bold] #S #[bg=#343f44,fg=#a7c080]"
set -g status-left-length 30
set -g status-right "#[fg=#7fbbb3]%H:%M #[fg=#859289]%d-%b-%y "

# windows: muted grey inactive, everforest green active
set -g window-status-format "#[fg=#859289] #I:#W "
set -g window-status-current-format "#[bg=#4f5b58,fg=#a7c080,bold] #I:#W "
set -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#4f5b58"
set -g pane-active-border-style "fg=#a7c080"

# command/message line
set -g message-style "bg=#4f5b58,fg=#d3c6aa"

# ensure neovim escape time is fast
set -sg escape-time 0
